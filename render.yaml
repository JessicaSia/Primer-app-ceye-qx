services:
  - type: web
    name: ceye-qx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OLLAMA_URL
        value: https://ollama.com/api/generate
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_API_KEY
        sync: false
