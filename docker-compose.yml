services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ceye_inventory
      POSTGRES_USER: ceye_user
      POSTGRES_PASSWORD: ceye_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceye_user -d ceye_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://ceye_user:ceye_password@db:5432/ceye_inventory
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
